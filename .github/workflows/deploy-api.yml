name: Deploy Prediction API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions-sa@chronic-kd.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t europe-west1-docker.pkg.dev/chronic-kd/ml-repo/prediction-api:latest api/
          docker push europe-west1-docker.pkg.dev/chronic-kd/ml-repo/prediction-api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update prediction-api \
            --image europe-west1-docker.pkg.dev/chronic-kd/ml-repo/prediction-api:latest \
            --region europe-west1 \
            --project chronic-kd
